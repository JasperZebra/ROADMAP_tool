<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Roadmap Pro — Projects</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:#1e1f22;font-family:'Segoe UI',system-ui,sans-serif;color:#dbdee1;}

/* ── Header ───────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:200;
  background:#111214;border-bottom:1px solid #111;
  padding:0 24px;height:56px;
  display:flex;align-items:center;gap:10px;
}
.logo{font-size:17px;font-weight:700;color:#ddd;white-space:nowrap;margin-right:4px;}
.logo em{color:#7289da;font-style:normal;font-weight:400;}
.search-wrap{flex:1;max-width:320px;position:relative;}
.search-wrap input{
  width:100%;height:32px;background:#1e1f22;border:1px solid #2e3035;
  color:#dbdee1;padding:0 12px 0 32px;border-radius:6px;
  font-size:12px;outline:none;font-family:inherit;
}
.search-wrap input:focus{border-color:#4752c4;}
.search-wrap input::placeholder{color:#5c6068;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#5c6068;font-size:13px;pointer-events:none;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#5c6068;flex-shrink:0;transition:background .3s;}
.online-dot.connected{background:#48a97a;}
.user-chip{font-size:12px;color:#72767d;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .15s;}
.user-chip:hover{background:#2b2d31;color:#fff;}

/* ── Buttons ──────────────────────────────────────────── */
.btn{
  height:32px;padding:0 14px;border-radius:5px;
  border:1px solid #3a3a3a;background:#2b2d31;
  color:#dbdee1;font-size:12px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;text-decoration:none;white-space:nowrap;
}
.btn:hover{background:#3a3c42;color:#fff;}
.btn.blue{background:#4752c4;border-color:#4752c4;color:#fff;}
.btn.blue:hover{background:#5865f2;}
.btn.red{background:#c0392b;border-color:#c0392b;color:#fff;}
.btn.red:hover{background:#e74c3c;}
.btn.icon{padding:0;width:32px;justify-content:center;}
.btn.active{background:#4752c4;border-color:#4752c4;color:#fff;}

/* ── Toolbar bar (below header) ───────────────────────── */
.toolbar{
  padding:12px 24px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid #111;background:#18191c;
}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;}
.toolbar-right{display:flex;align-items:center;gap:6px;}
.sort-select{
  height:32px;background:#2b2d31;border:1px solid #3a3a3a;
  color:#dbdee1;padding:0 10px;border-radius:5px;font-size:12px;
  outline:none;cursor:pointer;
}
.sort-select:hover{background:#3a3c42;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#5c6068;letter-spacing:.8px;}

/* ── Grid / List views ────────────────────────────────── */
.main{padding:24px;max-width:1300px;margin:0 auto;}

.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:14px;
}

.projects-list{display:flex;flex-direction:column;gap:6px;}

/* ── Grid card ────────────────────────────────────────── */
.project-card{
  background:#2b2d31;border:1px solid #1e1f22;border-radius:10px;
  padding:16px;cursor:pointer;position:relative;
  transition:all .15s;display:flex;flex-direction:column;gap:10px;
  min-height:160px;
}
.project-card:hover{background:#313338;border-color:#4752c4;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.35);}
.project-card.pinned{border-color:#f5a623;}

.card-top{display:flex;align-items:center;gap:6px;height:22px;}
.card-pin-btn{
  background:none;border:none;cursor:pointer;font-size:14px;
  opacity:0;transition:opacity .15s;padding:0;line-height:1;color:#5c6068;
}
.project-card:hover .card-pin-btn{opacity:1;}
.card-pin-btn.pinned{opacity:1 !important;color:#f5a623;}
.card-spacer{flex:1;}

.card-color-wrap{position:relative;}
.card-color-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.15);transition:transform .15s;flex-shrink:0;}
.card-color-dot:hover{transform:scale(1.3);}
.card-color-input{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}

.card-more-btn{
  background:none;border:none;cursor:pointer;color:#5c6068;
  font-size:16px;padding:0 2px;line-height:1;opacity:0;transition:opacity .15s;
}
.project-card:hover .card-more-btn{opacity:1;}
.card-more-btn:hover{color:#fff;}

.card-accent{height:3px;border-radius:2px;width:100%;}
.card-name{font-size:14px;font-weight:700;color:#fff;line-height:1.4;word-break:break-word;outline:none;}
.card-name[contenteditable="true"]{
  background:#1e1f22;border:1px solid #4752c4;border-radius:4px;
  padding:2px 6px;cursor:text;
}
.card-nodes{font-size:11px;color:#72767d;}
.card-presence{display:flex;gap:3px;flex-wrap:wrap;min-height:20px;}
.card-meta{font-size:11px;color:#5c6068;margin-top:auto;}
.card-complete-star{position:absolute;top:-12px;right:-8px;font-size:20px;pointer-events:none;z-index:10;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6));}
.project-card.completed{border-color:#f5a623;}
.project-card.archived{opacity:0.5;}
.archived-badge{font-size:10px;background:#3a3c42;color:#949ba4;padding:1px 6px;border-radius:4px;font-weight:600;}

/* ── List row ─────────────────────────────────────────── */
.list-row{
  background:#2b2d31;border:1px solid #1e1f22;border-radius:7px;
  padding:10px 14px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:all .15s;
}
.list-row:hover{background:#313338;border-color:#4752c4;}
.list-row.pinned{border-color:#f5a623;}
.list-row.completed{border-color:#f5a623;}
.list-row.archived{opacity:0.5;}
.list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.list-name{font-size:13px;font-weight:600;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-nodes{font-size:11px;color:#72767d;width:70px;flex-shrink:0;}
.list-presence{display:flex;gap:3px;width:80px;flex-shrink:0;}
.list-meta{font-size:11px;color:#5c6068;width:100px;flex-shrink:0;text-align:right;}
.list-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.list-row:hover .list-actions{opacity:1;}

/* ── Presence avatars ─────────────────────────────────── */
.pres-dot{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  border:2px solid #2b2d31;flex-shrink:0;
  position:relative;
}
.pres-dot::after{
  content:attr(data-tip);
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:2px 6px;border-radius:4px;
  white-space:nowrap;font-size:10px;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:999;
}
.pres-dot:hover::after{opacity:1;}

/* ── Dropdowns ────────────────────────────────────────── */
.dropdown{position:relative;}
.dropdown-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  background:#111214;border:1px solid #3a3c42;border-radius:6px;
  padding:4px;min-width:160px;z-index:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:none;flex-direction:column;gap:1px;
}
.dropdown-menu.show{display:flex;}
.dd-item{
  padding:7px 12px;border-radius:4px;cursor:pointer;
  font-size:12px;color:#dbdee1;
  display:flex;align-items:center;gap:8px;
  transition:background .1s;white-space:nowrap;user-select:none;
}
.dd-item:hover{background:#2b2d31;color:#fff;}
.dd-item.danger:hover{background:#c0392b;color:#fff;}
.dd-sep{height:1px;background:#2e3035;margin:3px 4px;}

/* ── Modals ───────────────────────────────────────────── */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);z-index:600;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:#2b2d31;border-radius:12px;padding:28px;
  width:340px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 16px 48px rgba(0,0,0,0.5);border:1px solid #3a3c42;
}
.modal h3{color:#fff;font-size:17px;font-weight:700;}
.modal p{color:#949ba4;font-size:13px;line-height:1.6;}
.modal input[type="text"]{
  width:100%;background:#1e1f22;border:1px solid #3a3c42;
  color:#fff;padding:10px 14px;border-radius:6px;
  font-size:14px;outline:none;font-family:inherit;
}
.modal input[type="text"]:focus{border-color:#7289da;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;}

/* ── Name overlay ─────────────────────────────────────── */
#name-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);z-index:700;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.name-modal{
  background:#2b2d31;border-radius:12px;padding:32px;
  width:320px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 16px 48px rgba(0,0,0,0.6);border:1px solid #3a3c42;
}
.name-modal h2{color:#fff;font-size:20px;font-weight:700;}
.name-modal p{color:#949ba4;font-size:13px;line-height:1.6;}
.name-modal input{
  width:100%;background:#1e1f22;border:1px solid #3a3c42;
  color:#fff;padding:10px 14px;border-radius:6px;
  font-size:14px;outline:none;font-family:inherit;
}
.name-modal input:focus{border-color:#7289da;}

.empty-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:#5c6068;
}
.empty-state h3{font-size:18px;margin-bottom:8px;color:#72767d;}
.empty-state p{font-size:13px;line-height:1.6;}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">Roadmap <em>Pro</em></span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search projects..." autocomplete="off">
  </div>
  <div class="header-right">
    <div class="online-dot" id="online-dot" title="Connecting..."></div>
    <span class="user-chip" id="user-chip" onclick="showChangeName()" title="Click to change name"></span>
    <button class="btn blue" onclick="showNewProjectModal()">+ New Project</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <span class="section-title">Projects</span>
  </div>
  <div class="toolbar-right">
    <button class="btn" id="archived-toggle" onclick="toggleShowArchived()" title="Show archived projects">📦 Show Archived</button>
    <select class="sort-select" id="sort-select" onchange="setSortBy(this.value)">
      <option value="lastModified">Last Modified</option>
      <option value="created">Date Created</option>
      <option value="name">Name A–Z</option>
      <option value="nodes">Node Count</option>
    </select>
    <button class="btn icon" id="view-grid-btn" onclick="setView('grid')" title="Grid view" style="font-size:15px;">⊞</button>
    <button class="btn icon" id="view-list-btn" onclick="setView('list')" title="List view" style="font-size:15px;">☰</button>
  </div>
</div>

<div class="main">
  <div id="projects-container">
    <div style="color:#5c6068;font-size:13px;padding:40px 0;">Loading projects...</div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="new-project-modal">
  <div class="modal">
    <h3>New Project</h3>
    <input type="text" id="project-name-input" placeholder="e.g. Level Editor, UI Redesign..." maxlength="40" autocomplete="off">
    <div class="modal-actions">
      <button class="btn" onclick="hideNewProjectModal()">Cancel</button>
      <button class="btn blue" onclick="createProject()">Create →</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete Project</h3>
    <p>Are you sure you want to delete "<span id="delete-name" style="color:#fff;font-weight:600;"></span>"? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn" onclick="hideDeleteModal()">Cancel</button>
      <button class="btn red" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Change Name Modal -->
<div class="modal-overlay" id="change-name-modal">
  <div class="modal">
    <h3>Change Display Name</h3>
    <input type="text" id="change-name-input" placeholder="Your name..." maxlength="24" autocomplete="off">
    <div class="modal-actions">
      <button class="btn" onclick="hideChangeName()">Cancel</button>
      <button class="btn blue" onclick="confirmChangeName()">Save</button>
    </div>
  </div>
</div>

<!-- Name overlay (first time) -->
<div id="name-overlay" style="display:none;">
  <div class="name-modal">
    <h2>Welcome</h2>
    <p>Enter a display name so collaborators can see who you are on the canvas.</p>
    <input type="text" id="name-input" placeholder="Your name..." maxlength="24" autocomplete="off">
    <button class="btn blue" onclick="confirmName()" style="justify-content:center;height:40px;font-size:13px;font-weight:600;">Continue →</button>
  </div>
</div>

<script>
'use strict';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDTd8bdNHK6xIG5sd_j2_LZ6uy4aVQGMGw",
  authDomain:        "roadmap-53f16.firebaseapp.com",
  databaseURL:       "https://roadmap-53f16-default-rtdb.firebaseio.com",
  projectId:         "roadmap-53f16",
  storageBucket:     "roadmap-53f16.firebasestorage.app",
  messagingSenderId: "708743782367",
  appId:             "1:708743782367:web:f89c95edaeefdefd326e6a"
};

const ACCENT_COLORS = ['#4752c4','#48a97a','#5b82f5','#9b6fd6','#e05050','#f5a623','#00bcd4','#e91e63'];
const COLLAB_COLORS = ['#e05050','#48a97a','#f5a623','#9b6fd6','#00bcd4','#e91e63','#ff9800','#03a9f4'];

let _db = null;
let myUser = { id:'', name:'', color:'' };
let _deleteTargetId = null;
let _allProjects = {};
let _allPresence = {};
let sortBy = localStorage.getItem('rm_sort') || 'lastModified';
let viewMode = localStorage.getItem('rm_view') || 'grid';
let searchQuery = '';
let showArchived = false;

// ── User identity ─────────────────────────────────────────
function getStoredUser() {
  try { return JSON.parse(localStorage.getItem('rm_collab_user') || 'null'); } catch { return null; }
}
function initMyUser(name) {
  let stored = getStoredUser() || {
    id: Math.random().toString(36).slice(2, 12),
    color: COLLAB_COLORS[Math.floor(Math.random() * COLLAB_COLORS.length)]
  };
  stored.name = name || stored.name || 'User';
  localStorage.setItem('rm_collab_user', JSON.stringify(stored));
  myUser = stored;
  document.getElementById('user-chip').textContent = '● ' + myUser.name;
}

// ── Name prompts ──────────────────────────────────────────
['name-input','change-name-input'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') id === 'name-input' ? confirmName() : confirmChangeName();
    if (e.key === 'Escape') id === 'change-name-input' && hideChangeName();
  });
});

function confirmName() {
  const name = document.getElementById('name-input').value.trim() || 'User';
  initMyUser(name);
  document.getElementById('name-overlay').style.display = 'none';
  initFirebase();
}

function showChangeName() {
  document.getElementById('change-name-input').value = myUser.name;
  document.getElementById('change-name-modal').classList.add('show');
  setTimeout(() => document.getElementById('change-name-input').focus(), 50);
}
function hideChangeName() { document.getElementById('change-name-modal').classList.remove('show'); }
function confirmChangeName() {
  const name = document.getElementById('change-name-input').value.trim() || 'User';
  initMyUser(name);
  hideChangeName();
}

// ── Firebase ──────────────────────────────────────────────
function initFirebase() {
  try { firebase.app(); } catch { firebase.initializeApp(FIREBASE_CONFIG); }
  _db = firebase.database();

  // Online indicator
  _db.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('online-dot');
    if (snap.val()) {
      dot.classList.add('connected');
      dot.title = 'Connected';
    } else {
      dot.classList.remove('connected');
      dot.title = 'Disconnected';
    }
  });

  // Projects
  _db.ref('projects').on('value', snap => {
    _allProjects = snap.val() || {};
    render();
  });

  // Live presence across all rooms
  _db.ref('rooms').on('value', snap => {
    _allPresence = {};
    const rooms = snap.val() || {};
    Object.entries(rooms).forEach(([roomId, room]) => {
      if (room.presence) _allPresence[roomId] = room.presence;
    });
    render();
  });
}

// ── Render ────────────────────────────────────────────────
function render() {
  updateViewButtons();
  let entries = Object.entries(_allProjects);

  // Filter archived
  entries = entries.filter(([, p]) => showArchived ? !!p.archived : !p.archived);

  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    entries = entries.filter(([, p]) => p.name && p.name.toLowerCase().includes(q));
  }

  // Sort
  entries.sort((a, b) => {
    if (a[1].pinned && !b[1].pinned) return -1;
    if (!a[1].pinned && b[1].pinned) return 1;
    if (sortBy === 'name')         return (a[1].name || '').localeCompare(b[1].name || '');
    if (sortBy === 'created')      return (b[1].created || 0) - (a[1].created || 0);
    if (sortBy === 'nodes')        return (b[1].nodeCount || 0) - (a[1].nodeCount || 0);
    return (b[1].lastModified || 0) - (a[1].lastModified || 0);
  });

  const container = document.getElementById('projects-container');
  container.className = viewMode === 'list' ? 'projects-list' : 'projects-grid';
  container.innerHTML = '';

  if (entries.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>${searchQuery ? 'No results' : 'No projects yet'}</h3><p>${searchQuery ? 'Try a different search.' : 'Click "+ New Project" to get started.'}</p></div>`;
    return;
  }

  entries.forEach(([id, proj]) => {
    container.appendChild(viewMode === 'list' ? makeListRow(id, proj) : makeCard(id, proj));
  });
}

function makeCard(id, proj) {
  const color    = proj.color || ACCENT_COLORS[0];
  const pinned   = !!proj.pinned;
  const nodes    = proj.nodeCount || 0;
  const presence = _allPresence[id] || {};
  const presHtml = Object.values(presence).map(u =>
    `<div class="pres-dot" style="background:${u.color||'#999'}" data-tip="${esc(u.name||'User')}">${(u.name||'?')[0].toUpperCase()}</div>`
  ).join('');

  const completed  = !!proj.completed;
  const archived   = !!proj.archived;
  const lastEditBy = proj.lastEditedBy ? `· edited by ${esc(proj.lastEditedBy)}` : '';

  const el = document.createElement('div');
  el.className = 'project-card' + (pinned?' pinned':'') + (completed?' completed':'') + (archived?' archived':'');
  el.innerHTML = `
    ${completed ? '<div class="card-complete-star" title="Completed">⭐</div>' : ''}
    <div class="card-top">
      <button class="card-pin-btn ${pinned?'pinned':''}" onclick="togglePin('${id}',${pinned})" title="${pinned?'Unpin':'Pin to top'}">📌</button>
      <div class="card-spacer"></div>
      ${archived ? '<span class="archived-badge">Archived</span>' : ''}
      <div class="card-color-wrap">
        <div class="card-color-dot" style="background:${color}" onclick="this.nextElementSibling.click()" title="Change color"></div>
        <input type="color" class="card-color-input" value="${color}" onchange="changeColor('${id}',this.value)">
      </div>
      <div class="dropdown">
        <button class="card-more-btn" onclick="toggleDD('dd-${id}')">⋯</button>
        <div class="dropdown-menu" id="dd-${id}">
          <div class="dd-item" onclick="startRename('${id}');closeDD()">✏️ Rename</div>
          <div class="dd-item" onclick="duplicateProject('${id}');closeDD()">⧉ Duplicate</div>
          <div class="dd-sep"></div>
          <div class="dd-item" onclick="toggleComplete('${id}',${completed});closeDD()">${completed?'✅ Mark Incomplete':'⭐ Mark Complete'}</div>
          <div class="dd-item" onclick="toggleArchive('${id}',${archived});closeDD()">${archived?'📤 Unarchive':'📦 Archive'}</div>
          <div class="dd-sep"></div>
          <div class="dd-item danger" onclick="showDeleteModal('${id}','${esc(proj.name)}');closeDD()">🗑️ Delete</div>
        </div>
      </div>
    </div>
    <div class="card-accent" style="background:${color}"></div>
    <div class="card-name" id="name-${id}" ondblclick="startRename('${id}')">${esc(proj.name)}</div>
    <div class="card-nodes">${nodes} node${nodes===1?'':'s'}</div>
    <div class="card-presence">${presHtml}</div>
    <div class="card-meta">${timeAgo(proj.lastModified)} ${lastEditBy}</div>
  `;
  el.addEventListener('click', e => {
    if (e.target.closest('.card-pin-btn') || e.target.closest('.dropdown') ||
        e.target.closest('.card-color-wrap') || e.target.classList.contains('card-name') && e.target.contentEditable === 'true') return;
    openProject(id);
  });
  return el;
}

function makeListRow(id, proj) {
  const color      = proj.color || ACCENT_COLORS[0];
  const pinned     = !!proj.pinned;
  const completed  = !!proj.completed;
  const archived   = !!proj.archived;
  const nodes      = proj.nodeCount || 0;
  const presence   = _allPresence[id] || {};
  const lastEditBy = proj.lastEditedBy ? `· ${esc(proj.lastEditedBy)}` : '';
  const presHtml   = Object.values(presence).slice(0,4).map(u =>
    `<div class="pres-dot" style="background:${u.color||'#999'}" data-tip="${esc(u.name||'User')}">${(u.name||'?')[0].toUpperCase()}</div>`
  ).join('');

  const el = document.createElement('div');
  el.className = 'list-row' + (pinned?' pinned':'') + (completed?' completed':'') + (archived?' archived':'');
  el.innerHTML = `
    <div class="list-dot" style="background:${color}"></div>
    <div class="list-name">
      ${esc(proj.name)}
      ${completed ? ' <span title="Completed" style="font-size:13px;">⭐</span>' : ''}
      ${archived  ? ' <span class="archived-badge">Archived</span>' : ''}
    </div>
    <div class="list-nodes">${nodes} nodes</div>
    <div class="list-presence">${presHtml}</div>
    <div class="list-meta">${timeAgo(proj.lastModified)} ${lastEditBy}</div>
    <div class="list-actions">
      <button class="btn icon" onclick="togglePin('${id}',${pinned})" title="${pinned?'Unpin':'Pin'}" style="font-size:13px;color:${pinned?'#f5a623':'#5c6068'}">📌</button>
      <div class="dropdown">
        <button class="btn icon" onclick="toggleDD('ddl-${id}')" style="font-size:16px;">⋯</button>
        <div class="dropdown-menu" id="ddl-${id}">
          <div class="dd-item" onclick="startRename('${id}');closeDD()">✏️ Rename</div>
          <div class="dd-item" onclick="duplicateProject('${id}');closeDD()">⧉ Duplicate</div>
          <div class="dd-sep"></div>
          <div class="dd-item" onclick="toggleComplete('${id}',${completed});closeDD()">${completed?'✅ Mark Incomplete':'⭐ Mark Complete'}</div>
          <div class="dd-item" onclick="toggleArchive('${id}',${archived});closeDD()">${archived?'📤 Unarchive':'📦 Archive'}</div>
          <div class="dd-sep"></div>
          <div class="dd-item danger" onclick="showDeleteModal('${id}','${esc(proj.name)}');closeDD()">🗑️ Delete</div>
        </div>
      </div>
    </div>
  `;
  el.addEventListener('click', e => {
    if (e.target.closest('.list-actions')) return;
    openProject(id);
  });
  return el;
}

// ── Project actions ───────────────────────────────────────
function openProject(id) { window.location.href = 'new_version.html?p=' + id; }

function showNewProjectModal() {
  document.getElementById('project-name-input').value = '';
  document.getElementById('new-project-modal').classList.add('show');
  setTimeout(() => document.getElementById('project-name-input').focus(), 50);
}
function hideNewProjectModal() { document.getElementById('new-project-modal').classList.remove('show'); }
document.getElementById('project-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
  if (e.key === 'Escape') hideNewProjectModal();
});

function createProject() {
  const name = document.getElementById('project-name-input').value.trim();
  if (!name) { document.getElementById('project-name-input').focus(); return; }
  const id = Math.random().toString(36).slice(2, 10);
  const color = ACCENT_COLORS[Math.floor(Math.random() * ACCENT_COLORS.length)];
  const now = Date.now();
  _db.ref('projects/' + id).set({ name, color, created: now, lastModified: now, createdBy: myUser.name, nodeCount: 0, pinned: false, completed: false, archived: false })
    .then(() => { hideNewProjectModal(); openProject(id); });
}

function startRename(id) {
  const el = document.getElementById('name-' + id);
  if (!el) return;
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range);

  const save = () => {
    el.contentEditable = 'false';
    const newName = el.textContent.trim() || _allProjects[id]?.name || 'Untitled';
    el.textContent = newName;
    _db.ref('projects/' + id + '/name').set(newName).catch(() => {});
  };
  el.onblur = save;
  el.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } if (e.key === 'Escape') { el.textContent = _allProjects[id]?.name || ''; el.blur(); } };
}

function duplicateProject(id) {
  const src = _allProjects[id]; if (!src) return;
  const newId = Math.random().toString(36).slice(2, 10);
  const now = Date.now();
  const meta = Object.assign({}, src, { name: src.name + ' (copy)', created: now, lastModified: now, createdBy: myUser.name });

  _db.ref('projects/' + newId).set(meta).then(() => {
    // Copy canvas state if it exists
    _db.ref('rooms/' + id + '/state').once('value', snap => {
      if (snap.val()) _db.ref('rooms/' + newId + '/state').set(snap.val());
    });
  });
}

function togglePin(id, currentlyPinned) {
  _db.ref('projects/' + id + '/pinned').set(!currentlyPinned).catch(() => {});
}
function toggleComplete(id, currently) {
  _db.ref('projects/' + id + '/completed').set(!currently).catch(() => {});
  if (!currently) fireConfetti();
}

function fireConfetti() {
  const colors = ['#f5a623','#4752c4','#48a97a','#e05050','#9b6fd6','#fff','#ffd700'];
  const burst = (x, angle) => confetti({
    particleCount: 180,
    angle,
    spread: 110,
    startVelocity: 60,
    ticks: 200,
    origin: { x, y: 1 },
    scalar: 2,
    colors
  });
  burst(0.15,  65);
  burst(0.85, 115);
  setTimeout(() => burst(0.5, 90), 250);
}
function toggleArchive(id, currently) {
  _db.ref('projects/' + id + '/archived').set(!currently).catch(() => {});
}
function toggleShowArchived() {
  showArchived = !showArchived;
  const btn = document.getElementById('archived-toggle');
  btn.classList.toggle('active', showArchived);
  btn.textContent = showArchived ? '📦 Hide Archived' : '📦 Show Archived';
  render();
}

function changeColor(id, color) {
  _db.ref('projects/' + id + '/color').set(color).catch(() => {});
}

function showDeleteModal(id, name) {
  _deleteTargetId = id;
  document.getElementById('delete-name').textContent = name;
  document.getElementById('delete-modal').classList.add('show');
}
function hideDeleteModal() { _deleteTargetId = null; document.getElementById('delete-modal').classList.remove('show'); }
function confirmDelete() {
  if (!_deleteTargetId) return;
  Promise.all([
    _db.ref('projects/' + _deleteTargetId).remove(),
    _db.ref('rooms/' + _deleteTargetId).remove()
  ]).then(hideDeleteModal);
}

// ── Sort / View / Search ──────────────────────────────────
function setSortBy(val) {
  sortBy = val; localStorage.setItem('rm_sort', val); render();
}
function setView(mode) {
  viewMode = mode; localStorage.setItem('rm_view', mode); render();
}
function updateViewButtons() {
  document.getElementById('view-grid-btn').classList.toggle('active', viewMode === 'grid');
  document.getElementById('view-list-btn').classList.toggle('active', viewMode === 'list');
  document.getElementById('sort-select').value = sortBy;
}

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// ── Dropdowns ─────────────────────────────────────────────
function toggleDD(id) {
  const menu = document.getElementById(id);
  if (!menu) return;
  const wasOpen = menu.classList.contains('show');
  closeDD();
  if (!wasOpen) menu.classList.add('show');
}
function closeDD() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); }
document.addEventListener('click', e => { if (!e.target.closest('.dropdown')) closeDD(); });

// ── Helpers ───────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return 'never';
  const d = Date.now() - ts;
  const m = Math.floor(d/60000), h = Math.floor(d/3600000), dy = Math.floor(d/86400000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  if (h < 24) return h + 'h ago';
  if (dy < 30) return dy + 'd ago';
  return new Date(ts).toLocaleDateString();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Boot ──────────────────────────────────────────────────
(function boot() {
  const stored = getStoredUser();
  if (stored && stored.name) {
    initMyUser(stored.name);
    initFirebase();
  } else {
    document.getElementById('name-overlay').style.display = 'flex';
  }
})();
</script>
</body>
